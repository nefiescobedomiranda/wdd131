<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Review Form</title>

  <meta name="description" content="Product review form for evaluating industrial equipment products.">
  <meta name="author" content="Nefi Moroni Escobedo Miranda">

  <link rel="stylesheet" href="styles/form.css">
  <script defer src="scripts/form.js"></script>
</head>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>

  <form action="review.html" method="get">

    <!-- PRODUCT -->
    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- RATING -->
    <fieldset>
      <legend>Overall Rating</legend>

      <input type="radio" id="r1" name="rating" value="1" required>
      <label for="r1">1 ☆</label>

      <input type="radio" id="r2" name="rating" value="2">
      <label for="r2">2 ☆</label>

      <input type="radio" id="r3" name="rating" value="3">
      <label for="r3">3 ☆</label>

      <input type="radio" id="r4" name="rating" value="4">
      <label for="r4">4 ☆</label>

      <input type="radio" id="r5" name="rating" value="5">
      <label for="r5">5 ☆</label>

    </fieldset>

    <!-- DATE -->
    <label for="date">Date of Installation</label>
    <input type="date" id="date" name="date" required>

    <!-- FEATURES -->
    <fieldset>
      <legend>Useful Features</legend>

      <input type="checkbox" id="f1" name="features" value="durability">
      <label for="f1">Durability</label>

      <input type="checkbox" id="f2" name="features" value="ease">
      <label for="f2">Ease of Use</label>

      <input type="checkbox" id="f3" name="features" value="design">
      <label for="f3">Design</label>

      <input type="checkbox" id="f4" name="features" value="performance">
      <label for="f4">Performance</label>

    </fieldset>

    <!-- REVIEW -->
    <label for="review">Written Review</label>
    <textarea id="review" name="review"></textarea>

    <!-- USER -->
    <label for="username">Your Name</label>
    <input type="text" id="username" name="username">

    <!-- SUBMIT -->
    <input type="submit" value="Submit Review">

  </form>

</main>

<footer>
  <p>© <span id="year"></span> Product Review</p>
  <p>Last Modified: <span id="lastModified"></span></p>
</footer>

</body>
</html>
