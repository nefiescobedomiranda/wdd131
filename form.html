<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="description" content="Product review form for industrial equipment evaluation and feedback submission.">
    <meta name="author" content="Nefi Moroni Escobedo Miranda">

    <link rel="stylesheet" href="styles/form.css">
    <script defer src="scripts/form.js"></script>
</head>

<body>

<header>
    <h1>Product Review</h1>
</header>

<main>
    <form action="review.html" method="get">
        <label for="product">Product Name</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Choose a Product ...</option>
        </select>
        <fieldset class="rating-group">
            <legend>Overall Rating</legend>
            <div class="rating-options">
                <div>
                    <label for="r1">☆</label>
                    <input type="radio" id="r1" name="rating" value="1" required>
                </div>

                <div>
                    <label for="r2">☆☆</label>
                    <input type="radio" id="r2" name="rating" value="2">
                </div>

                <div>
                    <label for="r3">☆☆☆</label>
                    <input type="radio" id="r3" name="rating" value="3">
                </div>

                <div>
                    <label for="r4">☆☆☆☆</label>
                    <input type="radio" id="r4" name="rating" value="4">
                </div>

                <div>
                    <label for="r5">☆☆☆☆☆</label>
                    <input type="radio" id="r5" name="rating" value="5">
                </div>

            </div>
        </fieldset>

        <label for="date">Date of Installation</label>
        <input type="date" id="date" name="date" required>

        <fieldset class="features-group">
            <legend>
                Which features did you find useful in the product?
                <br>
                <em>(Check all that apply)</em>
            </legend>

            <div>
                <input type="checkbox" id="f1" name="features" value="durability">
                <label for="f1">Durability</label>
            </div>

            <div>
                <input type="checkbox" id="f2" name="features" value="ease">
                <label for="f2">Ease of Use</label>
            </div>

            <div>
                <input type="checkbox" id="f3" name="features" value="performance">
                <label for="f3">Performance</label>
            </div>

            <div>
                <input type="checkbox" id="f4" name="features" value="design">
                <label for="f4">Design</label>
            </div>

        </fieldset>

        <label for="review">
            Written Review
            <span class="optional">(Optional)</span>
        </label>

        <textarea id="review" name="review"></textarea>

        <label for="username">
            Your Name
            <span class="optional">(Optional)</span>
        </label>

        <input type="text" id="username" name="username">

        <input type="submit" value="Post Review">

    </form>

</main>

<footer>
    <p>© <span id="year"></span> Product Review</p>
    <p>Last Modified: <span id="lastModified"></span></p>
</footer>

</body>
</html>
