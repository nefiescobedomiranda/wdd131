<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>South America Temple Album</title>

    <meta name="description"
        content="Explore a responsive photo gallery featuring beautiful temples from South America with modern HTML, CSS, and JavaScript design.">

    <meta name="author" content="Nefi Moroni Escobedo Miranda">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/temples.css">

    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <div class="header-container">
            <h1>Temple Album</h1>
            <button id="menu-button" aria-label="Navigation Menu">
                ☰
            </button>
        </div>
        <nav id="nav-menu">
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>

        </nav>
    </header>

    <main>
        <h2>South America Temple Gallery</h2>
        <section class="gallery">
            <figure>
                <img src="images/lima.jpg"
                    alt="Lima Peru Temple"
                    loading="lazy">
                <figcaption>Lima Peru Temple</figcaption>
            </figure>

            <figure>
                <img src="images/arequipa.jpg"
                    alt="Arequipa Peru Temple"
                    loading="lazy">
                <figcaption>Arequipa Peru Temple</figcaption>
            </figure>

            <figure>
                <img src="images/bogota.jpg"
                    alt="Bogotá Colombia Temple"
                    loading="lazy">
                <figcaption>Bogotá Colombia Temple</figcaption>
            </figure>

            <figure>
                <img src="images/buenosaires.jpg"
                    alt="Buenos Aires Argentina Temple"
                    loading="lazy">
                <figcaption>Buenos Aires Argentina Temple</figcaption>
            </figure>

            <figure>
                <img src="images/santiago.jpg"
                    alt="Santiago Chile Temple"
                    loading="lazy">
                <figcaption>Santiago Chile Temple</figcaption>
            </figure>

            <figure>
                <img src="images/quito.jpg"
                    alt="Quito Ecuador Temple"
                    loading="lazy">
                <figcaption>Quito Ecuador Temple</figcaption>
            </figure>

            <figure>
                <img src="images/montevideo.jpg"
                    alt="Montevideo Uruguay Temple"
                    loading="lazy">
                <figcaption>Montevideo Uruguay Temple</figcaption>
            </figure>

            <figure>
                <img src="images/asuncion.jpg"
                    alt="Asunción Paraguay Temple"
                    loading="lazy">
                <figcaption>Asunción Paraguay Temple</figcaption>
            </figure>

            <figure>
                <img src="images/saopaulo.jpg"
                    alt="São Paulo Brazil Temple"
                    loading="lazy">
                <figcaption>São Paulo Brazil Temple</figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>
            © <span id="currentyear"></span>
            | Nefi Moroni Escobedo Miranda
            | Peru
        </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
